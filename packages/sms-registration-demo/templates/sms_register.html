{% extends "layout/immersive.html" %}
{% block content %}
<div class="row"><div class="columns">
  <div class="immersive--content immersive--center">
    <h1>{{ _('SMS Sign Up') }}</h1>
    <p>{{ _('Enter your phone number and username. A six-digit verification code will be sent in demo mode.') }}</p>
    <form method="POST">
      <div class="row"><div class="columns">
        <label class="inverse material textbox">
          {{ _('Phone Number') }}
          <input name="phone" type="text" inputmode="numeric" autocomplete="tel" placeholder="13800138000" autofocus>
        </label>
      </div></div>
      <div class="row"><div class="columns">
        <label class="inverse material textbox">
          {{ _('Username') }}
          <input name="uname" type="text" autocomplete="username">
        </label>
      </div></div>
      <div class="row"><div class="columns">
        <div class="text-center">
          <input type="submit" value="{{ _('Send Verification Code') }}" class="inverse expanded rounded primary button">
        </div>
      </div></div>
    </form>
    <div class="text-center supplementary inverse">
      <a href="{{ url('user_register') }}">{{ _('Use email registration instead') }}</a>
    </div>
  </div>
</div></div>
{% endblock %}
